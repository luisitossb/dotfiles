# Start Listeners
exec-once = ~/.config/hypr/scripts/low-bat-notification.sh
exec-once = ~/.config/hypr/scripts/gtk-theme-switcher.sh

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Start Quickshell daemon + restore wallpaper + start overview
exec-once = ~/.config/quickshell/scripts/qs-autostart.sh

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh

# Using hypridle to start hyprlock (mode-aware: reads ~/.config/mode/current)
exec-once = ~/.local/bin/start-hypridle.sh

# Load cliphist history
exec-once = wl-paste --watch cliphist store -max-items 100

# Start autostart cleanup
exec-once = ~/.config/hypr/scripts/cleanup.sh

# Quickshell is started by qs-autostart.sh above

# Workspace cascade — fill gaps when a workspace is closed
exec-once = ~/.local/bin/cascade-workspaces.py

# Workspace layout
exec-once = [workspace 1 silent] kitty
