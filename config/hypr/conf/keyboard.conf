# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus=false

    # ── Mouse tuning ──────────────────────────────────────────────────────────
    sensitivity = 0        # Pointer speed: -1.0 (slow) → 0 (default) → 1.0 (fast)
    scroll_factor = 0.75    # Scroll speed: lower = slower (1.0 = default)

    touchpad {
        natural_scroll = false
        scroll_factor = 0.55  # Touchpad scroll factor
        disable_while_typing = false
    }
}

# ── Per-device sensitivity ─────────────────────────────────────────────────
device {
    name = 2.4g-mouse-1
    sensitivity = 0.00   # mouse-sensitivity
}

device {
    name = elan1200:00-04f3:307a-touchpad
    sensitivity = 0.00   # trackpad-sensitivity
}
